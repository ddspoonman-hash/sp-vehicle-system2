<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>予約（試験版）</title>
  <style>
    *{ box-sizing:border-box; }
    body{
      font-family:sans-serif;
      margin:0;
      padding:10px;
      background:#f5f5f5;
      overflow-x:hidden;
    }
    .card{
      background:#fff;
      padding:15px;
      margin:10px auto;
      border-radius:12px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
      max-width:500px;
    }
    input,select,button{
      width:100%;
      max-width:100%;
      padding:12px;
      margin-top:8px;
      font-size:16px;
      border-radius:8px;
      border:1px solid #ccc;
    }
    button{
      background:#007bff;
      color:#fff;
      border:none;
    }
  </style>
</head>
<body>
  <h2>予約管理（試験版）</h2>

  <div class="card">
    <h3>予約追加</h3>
    <label>日付</label>
    <input id="date" type="date">

    <label>開始時間</label>
    <input id="start" type="time">

    <label>終了時間</label>
    <input id="end" type="time">

    <label>車両</label>
    <select id="car"></select>

    <label>用件</label>
    <input id="purpose" placeholder="例：送迎・通院">

    <button onclick="addReservation()">予約する</button>
  </div>

  <div class="card">
    <h3>予約一覧</h3>
    <div id="list"></div>
  </div>

  <button onclick="logout()">ログアウト</button>
  <script src="reservation.js?v=20260401-1"></script>
  <button onclick="location.href='driver_start.html'">戻る</button>
</body>
</html>
