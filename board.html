<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>掲示板（試験版）</title>
  <style>
    *{ box-sizing:border-box; }
    body{
      font-family:sans-serif;
      margin:0;
      padding:10px;
      background:#f5f5f5;
    }
    .card{
      background:#fff;
      padding:15px;
      margin:10px 0;
      border-radius:12px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }
    h3{ margin:5px 0; }
    input,select,button{
      width:100%;
      padding:12px;
      margin-top:8px;
      font-size:16px;
      border-radius:8px;
      border:1px solid #ccc;
    }
    button{
      background:#007bff;
      color:#fff;
      border:none;
    }
    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
      font-size:22px;
      font-weight:bold;
    }
  </style>
</head>
<body>
  <div class="header">掲示板（試験版）</div>

  <div class="card">
    <div id="list"></div>
    <input id="msg" placeholder="投稿内容">
    <button onclick="postMessage()">投稿</button>
  </div>

  <button onclick="logout()">ログアウト</button>

  <script src="board.js?v=20260401-1"></script>
</body>
</html>
